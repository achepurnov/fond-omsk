<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #231F20; background: #F8F9FC; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
        .code { font-size: 120px; font-weight: 800; background: linear-gradient(135deg, #11ACCD, #7FC06D, #C5CA31); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        h1 { font-size: 28px; margin: 16px 0 12px; }
        p { color: #666; font-size: 18px; margin-bottom: 32px; }
        a { display: inline-block; padding: 14px 36px; background: #C5CA31; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 700; font-size: 16px; }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Запрашиваемая страница не существует или была перемещена.</p>
    <a href="/fond-omsk/">На главную</a>
</body>
</html>
